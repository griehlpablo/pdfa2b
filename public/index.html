<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor em lote para PDF/A-2b</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #1f2937;
    }
    .container {
      max-width: 860px;
      margin: 40px auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 34px;
    }
    p {
      text-align: center;
      color: #4b5563;
    }
    .dropzone {
      border: 2px dashed #9ca3af;
      border-radius: 14px;
      background: #f9fafb;
      padding: 30px;
      text-align: center;
      margin-top: 24px;
    }
    .dropzone.dragover {
      background: #eef6ff;
      border-color: #2563eb;
    }
    input[type="file"] {
      display: none;
    }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 8px;
    }
    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
    .list {
      margin-top: 20px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
    }
    .item {
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .item:last-child {
      border-bottom: none;
    }
    .status {
      margin-top: 16px;
      border-radius: 12px;
      padding: 14px;
      display: none;
    }
    .status.show {
      display: block;
    }
    .success {
      background: #ecfdf5;
      color: #065f46;
    }
    .error {
      background: #fef2f2;
      color: #991b1b;
    }
    .small {
      margin-top: 18px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
    .actions {
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Conversor em lote para PDF/A-2b</h1>
    <p>Envie vários arquivos de uma vez. O sistema gera um ZIP com os aprovados, os reprovados e um relatório.</p>

    <div class="dropzone" id="dropzone">
      <div>Arraste vários arquivos aqui</div>
      <div>ou</div>
      <label class="btn" for="fileInput">Selecionar arquivos</label>
      <input type="file" id="fileInput" multiple />
    </div>

    <div class="actions">
      <button class="btn" id="convertBtn" disabled>Converter lote</button>
      <button class="btn" id="clearBtn">Limpar</button>
    </div>

    <div class="list" id="fileList"></div>
    <div class="status" id="statusBox"></div>

    <div class="small">
      Suporte nesta versão: PDF e formatos Office compatíveis com LibreOffice (DOC/DOCX/ODT/RTF/TXT/XLS/XLSX/ODS/CSV/PPT/PPTX/ODP).
    </div>
  </div>

  <script>
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const fileList = document.getElementById("fileList");
    const convertBtn = document.getElementById("convertBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusBox = document.getElementById("statusBox");

    let selectedFiles = [];

    function renderFiles() {
      fileList.innerHTML = "";
      selectedFiles.forEach((file, index) => {
        const div = document.createElement("div");
        div.className = "item";
        div.textContent = `${index + 1}. ${file.name}`;
        fileList.appendChild(div);
      });
      convertBtn.disabled = selectedFiles.length === 0;
    }

    function setStatus(message, type) {
      statusBox.className = `status show ${type}`;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function addFiles(files) {
      const incoming = Array.from(files);
      selectedFiles = [...selectedFiles, ...incoming];
      renderFiles();
      clearStatus();
    }

    fileInput.addEventListener("change", () => {
      addFiles(fileInput.files);
      fileInput.value = "";
    });

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("dragover");
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.classList.remove("dragover");
    });

    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("dragover");
      addFiles(e.dataTransfer.files);
    });

    clearBtn.addEventListener("click", () => {
      selectedFiles = [];
      renderFiles();
      clearStatus();
    });

    convertBtn.addEventListener("click", async () => {
      if (!selectedFiles.length) return;

      convertBtn.disabled = true;
      setStatus("Processando lote, aguarde...", "success");

      try {
        const formData = new FormData();
        for (const file of selectedFiles) {
          formData.append("files", file);
        }

        const response = await fetch("/convert-batch", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          let errorText = "Erro ao converter o lote.";
          try {
            const err = await response.json();
            errorText = err.error || errorText;
          } catch (_) {}
          throw new Error(errorText);
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "lote-pdfa2b.zip";
        document.body.appendChild(a);
        a.click();
        a.remove();

        window.URL.revokeObjectURL(url);
        setStatus("Lote concluído. O ZIP foi gerado com sucesso.", "success");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        convertBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
